<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ÖE">
  <!-- Adapts to the viewer's theme: ink on paper in light mode, inverted in dark. -->
  <style>
    .bg { fill: #14151a; }
    .fg { fill: #fbfaf8; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #eceef2; }
      .fg { fill: #0b0c0f; }
    }
  </style>
  <rect class="bg" width="64" height="64" rx="14" />
  <text
    class="fg"
    x="32"
    y="33"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="600"
    letter-spacing="-1"
  >ÖE</text>
</svg>
